[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
linker = "rust-lld"
rustflags = [
  "-C", "code-model=kernel",
  "-C", "relocation-model=static",
  "-C", "link-arg=-Tkernel/linker/x86_64.ld",
  "-C", "link-arg=--no-pie",
  "-C", "force-frame-pointers=yes",
]

[target.x86_64-unknown-hxnu]
linker = "rust-lld"
rustflags = [
  "-C", "code-model=kernel",
  "-C", "relocation-model=static",
  "-C", "link-arg=-Tkernel/linker/x86_64.ld",
  "-C", "link-arg=--no-pie",
  "-C", "force-frame-pointers=yes",
]
